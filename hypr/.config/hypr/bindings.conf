# Application bindings

$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"
$terminal = uwsm app -- kitty
$browser = omarchy-launch-browser

# ===== Application bindings =====
bindd = SUPER, RETURN, nvim terminal, exec,  $terminal -- nvim -c term -c startinsert
bindd = SUPER SHIFT, RETURN, Terminal, exec, $terminal

bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private

bindd = SUPER SHIFT, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, K, Show Keybindings, exec, omarchy-menu-keybindings
bindd = SUPER SHIFT, V, edit clipboard, exec, nvim-edit
bindd = SUPER SHIFT, W, Walker, exec, omarchy-launch-walker

# ===== Window management bindings =====
bind = SUPER, Q, exec, ~/.config/hypr/scripts/smart-close.sh
bind = SUPER, U, exec, ~/.config/hypr/scripts/undo-close.sh
bind = SUPER, E, exec, ~/.config/hypr/scripts/clean-close.sh
bind = SUPER SHIFT, Q, killactive
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER, M, Full width, fullscreen, 1
bindd = SUPER ALT, T, Toggle window floating/tiling, togglefloating,

# Control scratchpad
bindd = SUPER SHIFT, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, LEFT, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap window up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap window down, swapwindow, d

# ===== Navigation bindings =====
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d
bind = SUPER SHIFT, J, togglesplit

# Switch workspaces with SUPER + [1-9; 0]
bind = SUPER, 1, exec, ~/.config/hypr/scripts/workspace_switch.sh 1
bind = SUPER, 2, exec, ~/.config/hypr/scripts/workspace_switch.sh 2
bind = SUPER, 3, exec, ~/.config/hypr/scripts/workspace_switch.sh 3
bind = SUPER, 4, exec, ~/.config/hypr/scripts/workspace_switch.sh 4
bind = SUPER, 5, exec, ~/.config/hypr/scripts/workspace_switch.sh 5
bind = SUPER, 6, exec, ~/.config/hypr/scripts/workspace_switch.sh 6
bind = SUPER, 7, exec, ~/.config/hypr/scripts/workspace_switch.sh 7
bind = SUPER, 8, exec, ~/.config/hypr/scripts/workspace_switch.sh 8
bind = SUPER, 9, exec, ~/.config/hypr/scripts/workspace_switch.sh 9
bind = SUPER, 0, exec, ~/.config/hypr/scripts/workspace_switch.sh 0

bind = SUPER SHIFT, M, exec, ~/.config/hypr/scripts/change_monitor.sh
bind = SUPER ALT, M, exec, ~/.config/hypr/scripts/one_monitor.sh
# Move active window to a workspace with SUPER + SHIFT + [1-9; 0]
bindd = SUPER SHIFT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move window to workspace 10, movetoworkspace, 10


# ===== Media bindings =====
bindeld = SUPER, code:35, Volume up precise, exec, $osdclient --output-volume +5
bindeld = SUPER, code:34, Volume down precise, exec, $osdclient --output-volume -5
bindeld = SUPER SHIFT, code:35, Brightness up precise, exec, $osdclient --brightness +5
bindeld = SUPER SHIFT, code:34, Brightness down precise, exec, $osdclient --brightness -5
bindld = SUPER SHIFT, P, Pause, exec, $osdclient --playerctl play-pause

# ===== Screensaver bindings =====
bindd = SUPER SHIFT, L, Lock, exec, omarchy-lock-screen
bindd = SUPER ALT, L, Screensaver, exec, omarchy-launch-screensaver

# Clipboard
bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert,
bindd = SUPER CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# ===== Utilities bindings =====

# Kanata management
bindd = SUPER CTRL, K, Kanata, exec, systemctl --user restart kanata

# Menus
bindd = SUPER, SPACE, Launch apps, exec, omarchy-launch-walker
bindd = SUPER ALT, SPACE, Omarchy menu, exec, omarchy-menu
bindd = SUPER, ESCAPE, System menu, exec, omarchy-menu system

# Aesthetics
bindd = SUPER SHIFT, SPACE, Toggle top bar, exec, omarchy-toggle-waybar
bindd = SUPER CTRL, SPACE, Next background in theme, exec, omarchy-theme-bg-next

# Notifications
bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Restore last notification, exec, makoctl restore
bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke

# Toggle idling
bindd = SUPER CTRL, I, Toggle locking on idle, exec, omarchy-toggle-idle

# Toggle nightlight
bindd = SUPER CTRL, N, Toggle nightlight, exec, omarchy-toggle-nightlight

# Captures
bindd = , PRINT, Screenshot with editing, exec, omarchy-cmd-screenshot
bindd = SHIFT, PRINT, Screenshot to clipboard, exec, omarchy-cmd-screenshot smart clipboard
bindd = ALT, PRINT, Screenrecording, exec, omarchy-menu screenrecord
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a

# Control panels
bindd = SUPER CTRL, A, Audio controls, exec, omarchy-launch-audio
bindd = SUPER CTRL, B, Bluetooth controls, exec, omarchy-launch-bluetooth
bindd = SUPER CTRL, W, Wifi controls, exec, omarchy-launch-wifi

# Dictation
bindd  = SUPER, X, Start dictation (en), exec, voxtype record toggle --model base.en --clipboard
bindd  = SUPER SHIFT, X, Start dictation (fr), exec, voxtype record toggle --model large-v3-turbo --clipboard


unbind = CTRL, SPACE
bindd = CTRL, SPACE, Kando, global, :example-menu
